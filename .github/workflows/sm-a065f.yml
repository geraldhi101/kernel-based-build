name: Build Samsung A06 (SM-A065F)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */3 * *'

jobs:
  watchdog:
    name: Check for Updates
    runs-on: ubuntu-latest
    permissions: read-all
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    
      - name: Compare Release Tags
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        uses: ./.github/actions/00-check-update/kernelsu
          
  build:
    name: Build Execution
    needs: watchdog
    if: |
      ${{
        needs.watchdog.outputs.should-build == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        
      - name: Free Runner Disk Space
        uses: ./.github/actions/01-cleanup-runner
        
      - name: Install Build Dependencies
        uses: ./.github/actions/02-install-dependencies
        
      - name: Fetch Samsung A06 (SM-A065F) Kernel Source and Toolchain
        uses: ./.github/actions/03-fetch-sources/sm-a065f

      - name: Extract Samsung Kernel and toolchain archives
        uses: ./.github/actions/04-prepare-sources

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Merge Samsung Toolchain
        uses: ./.github/actions/05-merge-toolchain
          
      - name: Inject Root Implementation
        uses: ./.github/actions/06-inject-root
          
      - name: Execute Samsung Kernel Build
        uses: ./.github/actions/07-run-build/samsung

      - name: Prepare Files for Release
        uses: ./.github/actions/08-prepare-release
        
  release:
    name: Publishing Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  
    
      - name: Publish to GitHub Releases
        uses: ./.github/actions/09-publish-release
  
