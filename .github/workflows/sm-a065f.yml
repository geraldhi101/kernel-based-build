name: Build Samsung A06 (SM-A065F)

on:
  workflow_dispatch:
    inputs:
      fetch_gdown:
        description: 'Fetch using Google Drive (gdown)'
        type: boolean
        default: true
      fetch_wget:
        description: 'Fetch using Direct Link (wget)'
        type: boolean
        default: false
      fetch_git:
        description: 'Fetch using Git Clone'
        type: boolean
        default: false
      build_ksu:
        description: 'Build KernelSU'
        type: boolean
        default: true
      build_ksunext:
        description: 'Build KernelSU-Next'
        type: boolean
        default: false
  schedule:
    - cron: '0 0 */3 * *'

jobs:
  setup-build:
    name: Prepare Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      device_codename: ${{ steps.config.outputs.device_codename }}
      kernel_version: ${{ steps.config.outputs.kernel_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load Device Configuration
        id: config
        uses: ./.github/actions/00-device-config/sm-a065f

      - name: Generate Matrix Target
        id: set-matrix
        run: |
          TARGETS=()
          if [ "${{ inputs.build_ksu }}" == "true" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            TARGETS+=('"kernelsu"')
          fi
          if [ "${{ inputs.build_ksunext }}" == "true" ]; then
            TARGETS+=('"kernelsu-next"')
          fi
          if [ ${#TARGETS[@]} -eq 0 ]; then
            TARGETS+=('"kernelsu"') # Fallback if nothing checked
          fi
          JSON=$(IFS=,; echo "[${TARGETS[*]}]")
          echo "matrix={\"root_method\":$JSON}" >> $GITHUB_OUTPUT

  watchdog:
    name: Check for Updates
    runs-on: ubuntu-latest
    permissions: read-all
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Compare Release Tags
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        uses: ./.github/actions/00-check-update
          
  build:
    name: Build (${{ matrix.root_method }})
    needs: [setup-build, watchdog]
    if: |
      ${{
        needs.watchdog.outputs.should-build == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-build.outputs.matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Free Runner Disk Space
        uses: ./.github/actions/01-cleanup-runner
        
      - name: Install Build Dependencies
        uses: ./.github/actions/02-install-dependencies
        
      - name: Fetch Samsung Kernel Source and Toolchain
        uses: ./.github/actions/03-fetch-sources/sm-a065f
        with:
          use-gdown: ${{ inputs.fetch_gdown || 'true' }}
          use-wget: ${{ inputs.fetch_wget || 'false' }}
          use-git: ${{ inputs.fetch_git || 'false' }}

      - name: Extract Samsung Kernel and toolchain archives
        uses: ./.github/actions/04-prepare-sources

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Merge Samsung Toolchain
        uses: ./.github/actions/05-merge-toolchain
          
      - name: Inject Root Implementation
        uses: ./.github/actions/06-inject-root
        with:
          root-method: ${{ matrix.root_method }}
          
      - name: Execute Samsung Kernel Build
        uses: ./.github/actions/07-run-build/samsung

      - name: Prepare Files for Release
        uses: ./.github/actions/08-prepare-release
        with:
          device-codename: ${{ needs.setup-build.outputs.device_codename }}
          kernel-version: ${{ needs.setup-build.outputs.kernel_version }}
          root-method: ${{ matrix.root_method }}
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-files-${{ matrix.root_method }}
          path: output_release/*.gz
          retention-days: 1
        
  release:
    name: Publishing Release
    runs-on: ubuntu-latest
    needs: [setup-build, build] 
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Download all Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-files-* 
          merge-multiple: true     
          path: final-release-files

      - name: Publish to GitHub Releases
        uses: ./.github/actions/09-publish-release
        with:
          device_name: ${{ needs.setup-build.outputs.device_codename }}
          kernel_version: ${{ needs.setup-build.outputs.kernel_version }}
          files_path: "final-release-files/*"
