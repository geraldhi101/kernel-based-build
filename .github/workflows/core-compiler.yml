name: Shared Kernel Compiler Engine

on:
  workflow_call:
    inputs:
      variant-name:
        description: "Name of the root implementation"
        required: true
        type: string
        
jobs:
  build:
    name: Purge, Fetch, Patch, and Build
    runs-on: ubuntu-latest
    env:
      ROOT_TAG: ""
    permissions: 
      contents: write

    steps:
      # 1. Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # 2. Clean up the runner
      - name: Free Runner Disk Space
        uses: ./.github/actions/cleanup-runner
        
      # 3. Install Build Dependencies
      - name: Install Build Dependencies
        uses: ./.github/actions/install-dependencies
        
      # 4. Securely pull Kernel.tar.gz and toolchain.tar.gz
      - name: Fetch Samsung A06 (SM-A065F) Kernel Source and Toolchain
        uses: ./.github/actions/fetch-sources/sm-a065f

      # 5. Handle double extraction & drop intermediate archives instantly
      - name: Extract Samsung Kernel and toolchain archives
        uses: ./.github/actions/extract-sources

      # 6. Configure JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 7. Merge Samsung Toolchain
      - name: Merge Samsung Toolchain
        uses: ./.github/actions/merge-toolchain
          
      # 8. Automatically patch the kernel tree for root implementation
      - name: Inject Root Implementation
        uses: ./.github/actions/inject-root
          
      # 9. Fire off the original wrapper script provided by Samsung
      - name: Execute Samsung Kernel Build
        uses: ./.github/actions/run-build/samsung

      # 10. Gather the final kernel binary and .ko modules files
      - name: Prepare Files for Release
        uses: ./.github/actions/prepare-release

      # 11. Upload directly to GitHub Releases
      - name: Publish to GitHub Releases
        uses: ./.github/actions/publish-release
