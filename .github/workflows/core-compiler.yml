name: Shared Kernel Compiler Engine

on:
  workflow_call:
    inputs:
      variant-name:
        description: "Name of the root implementation"
        required: true
        type: string
      setup-url:
        description: "URL to fetch setup.sh from every root implementation" 
        required: true
        type: string
      patch-script:
        description: "Script to build the root implementation"
        required: true
        type: string
        
jobs:
  build:
    name: Purge, Fetch, Patch, and Build
    runs-on: ubuntu-22.04
    env:
      ROOT_TAG: ""
    permissions: 
      contents: write

    steps:
      # 1. Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # 2. Clean up the runner
      - name: Free Runner Disk Space
        uses: ./.github/actions/cleanup-runner
        
      # 3. Install Build Dependencies
      - name: Install Build Dependencies
        uses: ./.github/actions/install-dependencies
        
      # 4. Securely pull Kernel.tar.gz and toolchain.tar.gz
      - name: Fetch Samsung A06 (SM-A065F) Kernel Source and Toolchain
        uses: ./.github/actions/fetch-sm-a065f-sources

      # 5. Handle double extraction & drop intermediate archives instantly
      - name: Extract Samsung Kernel and toolchain archives
        uses: ./.github/actions/extract-sources

      # 6. Configure JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 7. Merge Samsung Toolchain
      - name: Merge Samsung Toolchain
        uses: ./.github/actions/merge-toolchain
          
      # 8. Automatically patch the kernel tree for root implementation
      - name: Inject Root Implementation
        run: |
          echo "Entering the kernel source directory..."
          cd kernel-6.6
          
          echo "Injecting ${{ inputs.variant-name }} setup script..."
          curl -LSs "${{ inputs.setup-url }}" | bash -
          
          echo "Executing variant-specific patches..."
          ${{ inputs.patch-script }}
          
      # 9. Fire off the original wrapper script provided by Samsung
      - name: Execute Samsung Kernel Build
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh

      # 10. Gather the final kernel binary and .ko modules files
      - name: Prepare Files for Release
        uses: ./.github/actions/prepare-release

      # 11. Upload directly to GitHub Releases
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ inputs.variant-name }}-${{ env.ROOT_TAG }}"
          name: "Samsung A06 (SM-A065F) ${{ inputs.variant-name }}"
          body: |
            Automated ${{ inputs.variant-name }} build for the Samsung A06 (SM-A065F).            
            **Included Files:**
            * `Image.gz`: Image file to be packed with boot.img using tool like magiskboot
            * `modules-with-symbols.tar.gz`: Compiled modules with debugging symbols
            * `modules-without-symbols.tar.gz`: Compiled modules without debugging symbols
          draft: false
          prerelease: false
          files: |
            output_release/Image.gz
            output_release/modules-with-symbols.tar.gz
            output_release/modules-without-symbols.tar.gz
