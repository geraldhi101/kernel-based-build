name: 'Fetch Sources with Fallback'
description: 'Fetch kernel/toolchain dynamically with automatic fallback.'

inputs:
  preferred-method:
    description: 'Preferred download method (gdown, wget, git)'
    required: false
    default: 'gdown'

  gdown-kernel-url:
    description: 'Google Drive URL or ID for Kernel Source'
    required: false
  gdown-toolchain-url:
    description: 'Google Drive URL or ID for Toolchain'
    required: false

  wget-kernel-url:
    description: 'Direct HTTP/S link for Kernel Source'
    required: false
  wget-toolchain-url:
    description: 'Direct HTTP/S link for Toolchain'
    required: false

  git-kernel-repo:
    description: 'Git Clone URL for Kernel Source'
    required: false
  git-toolchain-repo:
    description: 'Git Clone URL for Toolchain'
    required: false

runs:
  using: "composite"
  steps:
    - name: Fetch Kernel Source and Toolchain
      shell: bash
      run: |
        PREFERRED_METHOD="${{ inputs.preferred-method }}"

        run_gdown() {
          echo "==> Attempting gdown (Google Drive)..."
          if [ -z "${{ inputs.gdown-kernel-url }}" ] || [ -z "${{ inputs.gdown-toolchain-url }}" ]; then
            echo "Google Drive links not configured for this device. Skipping..."
            return 1
          fi

          if ! command -v gdown &> /dev/null; then
            pip3 install --break-system-packages gdown || pip3 install gdown
          fi

          gdown "${{ inputs.gdown-kernel-url }}" -O Kernel.tar.gz || return 1
          gdown "${{ inputs.gdown-toolchain-url }}" -O toolchain.tar.gz || return 1
          return 0
        }

        run_wget() {
          echo "==> Attempting wget (Direct Mirror)..."
          if [ -z "${{ inputs.wget-kernel-url }}" ] || [ -z "${{ inputs.wget-toolchain-url }}" ]; then
            echo "Wget mirrors not configured for this device. Skipping..."
            return 1
          fi

          wget -O Kernel.tar.gz "${{ inputs.wget-kernel-url }}" || return 1
          wget -O toolchain.tar.gz "${{ inputs.wget-toolchain-url }}" || return 1
          return 0
        }

        run_git() {
          echo "==> Attempting git (Clone Repository)..."
          if [ -z "${{ inputs.git-kernel-repo }}" ] || [ -z "${{ inputs.git-toolchain-repo }}" ]; then
            echo "Git repositories not configured for this device. Skipping..."
            return 1
          fi

          git clone --depth=1 "${{ inputs.git-kernel-repo }}" kernel_src || return 1
          git clone --depth=1 "${{ inputs.git-toolchain-repo }}" toolchain_src || return 1

          tar -czf Kernel.tar.gz -C kernel_src .
          tar -czf toolchain.tar.gz -C toolchain_src .
          return 0
        }

        if [ "$PREFERRED_METHOD" == "wget" ]; then
          METHODS=("run_wget" "run_gdown" "run_git")
        elif [ "$PREFERRED_METHOD" == "git" ]; then
          METHODS=("run_git" "run_wget" "run_gdown")
        else
          METHODS=("run_gdown" "run_wget" "run_git")
        fi

        SUCCESS=false
        for method in "${METHODS[@]}"; do
          if $method; then
            echo "SUCCESS: Fetched sources using $method!"
            SUCCESS=true
            break
          else
            echo "WARNING: $method failed or was unconfigured. Moving to next fallback..."
          fi
        done

        if [ "$SUCCESS" = false ]; then
          echo "FATAL ERROR: All fetch methods failed or lack configured links for this device!"
          exit 1
        fi
