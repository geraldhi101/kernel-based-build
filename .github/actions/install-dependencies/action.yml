name: 'Install Dependencies for Kernel Building'
description: 'Installing dependencies for building the kernel.'

runs: 
  using: "composite"
  steps:
    - name: Install Build Dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            git-core \
            gnupg \
            flex \
            bison \
            build-essential \
            llvm \
            zip \
            curl \
            zlib1g-dev \
            libc6-dev-i386 \
            libncurses5 \
            lib32ncurses5-dev \
            x11proto-core-dev \
            libx11-dev \
            lib32z1-dev \
            libgl1-mesa-dev \
            libxml2-utils \
            xsltproc \
            unzip \
            fontconfig \
            python3 \
            python3-pip \
            python-is-python3
            
        pip3 install gdown
