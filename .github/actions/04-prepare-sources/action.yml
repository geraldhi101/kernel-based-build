name: 'Extracting Kernel and Toolchain sources'
description: 'Extracting sources after fetching those.'

runs:
  using: "composite"
  steps:
    - name: Extract Samsung Kernel and toolchain archives
      shell: bash
      run: |
        echo "Extracting Kernel.tar.gz directly to working directories..."
        tar -xzvf Kernel.tar.gz
        rm -f Kernel.tar.gz
        
        if [ -f Kernel.tar ]; then
          echo "Unpacking nested Kernel.tar..."
          tar -xvf Kernel.tar
          rm -f Kernel.tar
        fi

        echo "Extracting toolchain.tar.gz..."
        mkdir temp_toolchain
        tar -xzvf toolchain.tar.gz -C temp_toolchain
        rm -f toolchain.tar.gz
        
        if [ -f temp_toolchain/toolchain.tar ]; then
          tar -xvf temp_toolchain/toolchain.tar -C temp_toolchain
          rm -f temp_toolchain/toolchain.tar
        fi
        
        echo "Verifying local directory structure:"
        ls -la
